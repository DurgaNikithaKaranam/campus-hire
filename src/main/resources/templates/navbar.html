<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Career Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:fragment="navbar">

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4 py-3">

    <!-- LOGO -->
    <a class="navbar-brand fw-bold">🎓 Career Portal</a>

    <div class="collapse navbar-collapse">

        <!-- CENTER LINKS -->
        <ul class="navbar-nav mx-auto gap-3">

            <!-- STUDENT -->
            <li th:if="${session.userRole != null and session.userRole.equals('student')}">
                <a class="nav-link" href="/student/dashboard">Dashboard</a>
            </li>

            <li th:if="${session.userRole != null and session.userRole.equals('student')}">
                <a class="nav-link" href="/opportunity/view">Opportunities</a>
            </li>

            <li th:if="${session.userRole != null and session.userRole.equals('student')}">
                <a class="nav-link" href="/application/my">My Applications</a>
            </li>

            <!-- ADMIN -->
            <li th:if="${session.userRole != null and session.userRole.equals('admin')}">
                <a class="nav-link" href="/admin/dashboard">Dashboard</a>
            </li>

            <li th:if="${session.userRole != null and session.userRole.equals('admin')}">
                <a class="nav-link" href="/opportunity/view">Manage Jobs</a>
            </li>

            <li th:if="${session.userRole != null and session.userRole.equals('admin')}">
                <a class="nav-link" href="/admin/applications">Applications</a>
            </li>

        </ul>

        <!-- RIGHT SIDE PROFILE -->
        <ul class="navbar-nav">

            <li class="nav-item dropdown">

                <a class="nav-link dropdown-toggle d-flex align-items-center"
                   href="#"
                   role="button"
                   data-bs-toggle="dropdown">

                    👤 <span class="ms-2 fw-semibold" th:text="${session.userName}"></span>
                </a>

                <ul class="dropdown-menu dropdown-menu-end shadow">

                    <li>
                        <a class="dropdown-item" href="/student/profile">
                            👤 Profile
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item text-danger" href="/logout">
                            🚪 Logout
                        </a>
                    </li>

                </ul>

            </li>

        </ul>

    </div>

</nav>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
