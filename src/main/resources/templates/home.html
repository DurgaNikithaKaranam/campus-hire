<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Career Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #ffffff;
        }

        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: bold;
        }

        .highlight {
            color: #ff5a00;
        }

        .hero p {
            font-size: 18px;
            color: #555;
            margin-top: 15px;
        }

        .btn-main {
            background: #ff5a00;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-right: 10px;
        }

        .btn-outline {
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 10px;
        }

        .btn-main:hover {
            background: #e14e00;
        }
    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<div th:replace="navbar :: navbar"></div>

<!-- 🔥 HERO SECTION -->
<div class="hero">

    <div>

        <h1>
            Find Your <span class="highlight">Dream Career</span>
        </h1>

        <p>
            One platform to explore internships, jobs, and track your applications easily.
        </p>

        <div class="mt-4">
            <a href="/student/login" class="btn btn-main">Login</a>
            <a href="/opportunity/view" class="btn btn-outline">Explore Jobs</a>
        </div>

    </div>

</div>

</body>
</html>
