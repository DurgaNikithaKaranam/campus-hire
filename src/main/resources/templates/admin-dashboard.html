<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .container {
            margin-top: 30px;
        }

        /* 🔥 Welcome Card */
        .admin-card {
            background: linear-gradient(135deg, #1d3557, #457b9d);
            color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        }

        .admin-card h2 {
            font-size: 30px;
            font-weight: bold;
        }

        .btn-custom {
            margin-right: 10px;
            border-radius: 10px;
            padding: 8px 15px;
        }

        /* 🔥 Stats */
        .stats-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
        }

        .stats-card h3 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div th:replace="~{navbar :: navbar}"></div>

<div class="container">

    <!-- 🔥 Admin Welcome -->
    <div class="admin-card">
        <h2>Admin Dashboard 👨‍💼</h2>
        <p>Manage jobs, applications and track platform activity.</p>

        <div class="mt-3">
            <a href="/admin/addPage" class="btn btn-success">➕ Add Job</a>
            <a href="/opportunity/view" class="btn btn-light btn-custom">📋 View Jobs</a>
            <a href="/admin/applications" class="btn btn-dark btn-custom">📄 View Applications</a>
        </div>
    </div>

    <!-- 🔥 Stats Section -->
    <div class="row mt-4">

        <div class="col-md-4">
            <div class="stats-card">
                <h3 th:text="${jobCount}">0</h3>
                <p>Total Jobs</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h3 th:text="${applicationCount}">0</h3>
                <p>Total Applications</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h3 th:text="${studentCount}">0</h3>
                <p>Total Students</p>
            </div>
        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</body>
</html>
