<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container-box {
            display: flex;
            height: 100vh;
        }

        /* LEFT PANEL */
        .left {
            width: 40%;
            background: #2874f0;
            color: white;
            padding: 40px;
        }

        .left h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .left p {
            font-size: 18px;
        }

        /* RIGHT PANEL */
        .right {
            width: 60%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-box {
            width: 300px;
        }

        input {
            border: none;
            border-bottom: 1px solid #ccc;
            width: 100%;
            margin-bottom: 20px;
            padding: 10px;
        }

        .btn-login {
            background: #fb641b;
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        .btn-login:hover {
            background: #e85a15;
        }
    </style>
</head>

<body>

<div class="container-box">

    <!-- LEFT -->
    <div class="left">
        <h2>Login</h2>
        <p>Get access to internships, jobs and track your applications easily.</p>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="form-box">

            <!-- ERROR -->
            <p style="color:red" th:text="${error}"></p>

            <form action="/student/loginPage" method="get">

                <input type="email" name="email" placeholder="Enter Email" required>

                <input type="password" name="password" placeholder="Enter Password" required>

                <button class="btn-login">Login</button>

            </form>

            <p class="mt-3">
                New user? <a href="/student/registerPage">Create an account</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
