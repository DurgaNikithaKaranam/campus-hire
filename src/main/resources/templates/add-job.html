<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Add New Opportunity</h2>

<form action="/admin/add-job" method="post">

    <input type="text" name="title" placeholder="Title" class="form-control mb-2" required>

    <input type="text" name="companyName" placeholder="Company" class="form-control mb-2" required>

    <select name="type" class="form-control mb-2">
        <option value="JOB">Job</option>
        <option value="INTERNSHIP">Internship</option>
    </select>

    <input type="text" name="applyLink" placeholder="Apply Link" class="form-control mb-2">

    <select name="year" class="form-control mb-2" required>
        <option value="2">2nd Year</option>
        <option value="3">3rd Year</option>
        <option value="4">4th Year</option>
    </select>
    <input type="text" name="branch" placeholder="Branch" class="form-control mb-2" required>

	<input type="text" name="description" placeholder="Description" class="form-control mb-2" required>

    <button type="submit" class="btn btn-success">Add Job</button>

</form>

</body>
</html>
