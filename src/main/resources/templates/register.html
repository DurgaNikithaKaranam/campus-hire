<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            max-width: 400px;
            margin: auto;
            margin-top: 80px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="card">

    <h3 class="text-center mb-3">Create Account</h3>

    <!-- ERROR -->
    <p style="color:red" th:text="${error}"></p>

    <!-- SUCCESS -->
    <p style="color:green" th:text="${msg}"></p>

    <form action="/student/register" method="post">

        <input type="text" name="name" placeholder="Full Name" class="form-control mb-2" required>

        <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>

        <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
		<select name="year" class="form-control mb-2" required>
    		<option value="">Select Year</option>
    		<option value="2">2nd Year</option>
    		<option value="3">3rd Year</option>
    			<option value="4">4th Year</option>
		</select>
        <input type="text" name="branch" placeholder="Branch" class="form-control mb-2">

        <button class="btn btn-success w-100">Register</button>

    </form>

    <p class="text-center mt-3">
        Already have an account?  
        <a href="/student/login">Login</a>
    </p>

</div>

</body>
</html>
