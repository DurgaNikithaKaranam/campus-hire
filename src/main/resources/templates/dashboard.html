<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .container {
            margin-top: 30px;
        }

        /* 🔥 Welcome Card */
        .welcome-card {
            background: linear-gradient(135deg, #ff5a00, #ff8c42);
            color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
        }

        .welcome-card h2 {
            font-size: 30px;
            font-weight: bold;
        }

        .welcome-card p {
            font-size: 16px;
            margin-top: 10px;
        }

        /* Buttons */
        .btn-custom {
            margin-right: 10px;
            border-radius: 10px;
            padding: 8px 15px;
        }

        /* 🔥 Stats Cards */
        .stats-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
        }

        .stats-card h3 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div th:replace="~{navbar :: navbar}"></div>

<div class="container">

    <!-- 🔥 Welcome Section -->
    <div class="welcome-card">
        <h2>Welcome, <span th:text="${name}"></span> 👋</h2>
        <p>Track your career journey and apply for opportunities easily.</p>

        <div class="mt-3">
            <a href="/opportunity/view" class="btn btn-light btn-custom">View Opportunities</a>
            <a href="/application/my" class="btn btn-dark btn-custom">My Applications</a>
        </div>
    </div>

    <!-- 🔥 Stats Section -->
    <div class="row mt-4">

        <div class="col-md-4">
            <div class="stats-card">
                <h3 th:text="${totalApplications}">0</h3>
                <p>Total Applications</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h3 th:text="${selectedCount}">0</h3>
                <p>Selected</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h3 th:text="${jobCount}">0</h3>
                <p>Available Jobs</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
