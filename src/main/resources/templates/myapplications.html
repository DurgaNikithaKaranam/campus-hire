<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Applications</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .container {
            margin-top: 30px;
        }

        .card-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
        }

        .status {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: white;
        }

        .applied { background: #fbbc04; }
        .selected { background: #34a853; }
        .rejected { background: #ea4335; }

        .title {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="container">

    <h2 class="mb-4">📄 My Applications</h2>

    <!-- EMPTY -->
    <p th:if="${#lists.isEmpty(details)}">No applications found</p>

    <!-- LIST -->
    <div th:each="d : ${details}" class="card-box">

        <div class="d-flex justify-content-between align-items-center">

            <!-- TEXT -->
            <div class="title" th:text="${d}"></div>

            <!-- STATUS COLOR -->
            <span th:if="${d.contains('APPLIED')}" class="status applied">APPLIED</span>
            <span th:if="${d.contains('SELECTED')}" class="status selected">SELECTED</span>
            <span th:if="${d.contains('REJECTED')}" class="status rejected">REJECTED</span>

        </div>

    </div>

</div>

</body>
</html>
