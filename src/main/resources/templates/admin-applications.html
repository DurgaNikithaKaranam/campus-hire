<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Applications</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .card-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
        }
        .status { padding: 5px 10px; border-radius: 8px; color: white; }
        .applied { background: orange; }
        .selected { background: green; }
        .rejected { background: red; }
    </style>
</head>

<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="row mb-4">

    <div class="col-md-4">
        <div class="card text-center p-3 shadow">
            <h4 th:text="${totalApplications}"></h4>
            <p>Total Applications</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center p-3 shadow">
            <h4 th:text="${totalStudents}"></h4>
            <p>Total Students</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center p-3 shadow">
            <h4 th:text="${totalJobs}"></h4>
            <p>Total Jobs</p>
        </div>
    </div>

</div>



<div class="container mt-5">

    <h4>🏢 Company-wise Applications</h4>

    <div th:each="entry : ${groupedData}">

        <h5 class="mt-3" th:text="${entry.key}"></h5>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Branch</th>
                    <th>Applications</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="b : ${entry.value}">
                    <td th:text="${b.key}"></td>
                    <td th:text="${b.value}"></td>
                </tr>
            </tbody>
        </table>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</body>
</html>
